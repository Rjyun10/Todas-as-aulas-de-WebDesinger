<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 5 - Formulário</title>
</head>
<body>
    <form>
        <h3>Dados pessoais</h3>
        Nome:<input type="text" name="nome"/><p>
        Idade:<input type="text" name="idade"/><p>
        <h2>Dados proficionais</h2>
        <b>Escolaridade:</b><select>
            <option>Opções de escolaridade</option>
            <option value="Básica">Ensino Básica</option>
            <option value="Médio">Ensino Médio</option>
            <option value="Superior">Ensino Superior</option>
        </select><br/>
        <h3>Área de atuação</h3>
        <input type="radio" name="atuação"/>Gerência <input type="radio" name="atuação"/>Financeiro <input type="radio" name="atuação"/>Recepção<p>
        <h3>Como podemos contatar você?</h3>
        <input type="checkbox" name="opc1"/>E-mail<br/>
        <input type="checkbox" name="opc2"/>Telefone<br/>
        <input type="checkbox" name="opc3"/>Whatsapp<br/>
        <input type="checkbox" name="opc4"/>Desejo receber notícias e dicas por e-mail<p>
        <input type="submit" value="Submit"/>
        <input type="reset" value="Reset"/>
    </form>
</body>
</html>
