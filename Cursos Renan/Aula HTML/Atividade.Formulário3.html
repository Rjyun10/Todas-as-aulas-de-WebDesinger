<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 3 - Formulário</title>
</head>
<body>
    <form>
        <h1>Formulário de Contato</h1><p>
        <h4>Deixe-nos saber suas perguntas, sugestões ou dúvidas, preenchendo o formulário de contato abaixo.</h4><hr><p>
        Nome: <input type="text" name="nome" placeholder="Nome"/><input type="text" name="último" placeholder="Último"/><br/><br/>
        E-mail: <input type="text" name="email"/><br/><br/>
        Telefone: <input type="text" name="fone" placeholder="### ### ####"/><br/><br/>
        Assunto: <select>
            <option value="Consulta">Consulta</option>
            <option value="Dúvidas">Dúvidas</option>
            <option value="Suporte">Suporte</option>
            <option value="Sugestões">Sugestões</option>
            <option value="Vendas/Orçamentos">Vendas/Orçamentos</option>
            <option value="Parcerias">Parcerias</option>
            <option value="Trabalhar Conosco">Trabalhar Conosco</option>
        </select><br/><br/>
        Mensagem: <textarea rows="6" name="mensagem"></textarea><br/><br/>
        <input type="submit" name="Enviar Formulário de Contato"/>
    </form>
</body>
</html>
