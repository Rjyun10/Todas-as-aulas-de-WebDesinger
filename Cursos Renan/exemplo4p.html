<!DOCTYPE html>

<body>
    <form method="" action="">

        <h1 class="titf">Contact form</h1><br/>

                <div class="box_input">

                    <input type="text" name="Lname" placeholder="Last Name">

            <div class="box_name">
                <p class="ef">Your E-mail</p></div>
                <div class="box_input">
                    <input type="text" name="email" placeholder="email456@gmail.com"></h3>
            </div>
            
            <div class="box_name">

                    <input type="text" name="Mnumber" placeholder="###">

            </div>
