<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo CSS Prática</title>
    <style type="text/css">@import url(CSS/estilo1.css);</style>
</head>
<body>
    <h2 class="tit">Classificação de Child-Pugh</h2>
    <table>
        <tr>
            <td>Critérios</td>
            <td>1 Pontos</td>
            <td>2 Pontos</td>
            <td>3 Pontos</td>
        </tr>
        <tr>
            <td>Encefalopatia</td>
            <td>Ausente</td>
            <td>Graus I e II</td>
            <td>Graus III e IV</td>
        </tr>
        <tr>
            <td>Ascite</td>
            <td>Ausente</td>
            <td>Pequena</td>
            <td>Volumosa</td>
        </tr>
        <tr>
            <td>INR (RNI)</td>
            <td>&lt; 1,7 </td>
            <td>1,7 - 2,3</td>
            <td>&gt; 2,3</td>
        </tr>
        <tr>
            <td>Bilirrubina total</td>
            <td>&lt; 2</td>
            <td>2 - 3</td>
            <td>&gt; 3</td>
        </tr>
        <tr>
            <td>Albumina</td>
            <td>&gt; 3,5</td>
            <td>2,8 - 3,5</td>
            <td>&lt; 2,8</td>
        </tr>
    </table>
</body>
</html>
