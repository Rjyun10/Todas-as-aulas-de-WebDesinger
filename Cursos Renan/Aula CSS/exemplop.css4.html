<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style type="text/css">@import url(CSS/estilo3.css);</style>
    <title>Exemplo 4 Prática</title>
</head>
<body>
    <form>
        <h1 class="titf">Contact form</h1><br/>
        <h2 class="subtitf">Please fill in your information and we'll be sending your order in time</h2><br/><br/>
        <h3 class="nf">Your Name  <input type="text" name="Fname" placeholder="Fist Name">  <input type="text" name="Lname" placeholder="Last Name"></h3>
        <h3 class="ef">Your E-mail  <input type="text" name="email" placeholder="email456@gmail.com"></h3>
        <h3 class="pf">Phone*  <input type="text" name="Fnumber" placeholder="###">  <input type="text" name="Mnumber" placeholder="###">  <input type="text" name="Lnumber" placeholder="####"></h3>
        <h3 class="msf">Message Subject*  <select>
            <option value="other">Other</option>
            <option value="isso">Isso</option>
            <option value="aquile">Aquele</option>
            <option value="aquilo">Aquilo</option>
        </select></h3>
        <h3 class="mf">Message*  <textarea name="opinion" rows="7"></textarea><hr>
        <input type="submit" value="SUBMIT FORM" class="inps">
    </form>
</body>
</html>
